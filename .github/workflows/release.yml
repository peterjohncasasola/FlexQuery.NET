name: Auto Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: 🛠 Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: 📦 Restore
      run: dotnet restore FlexQuery.NET.slnx

    - name: 🔨 Build
      run: dotnet build FlexQuery.NET.slnx --configuration Release --no-restore

    - name: 📦 Pack NuGet
      run: dotnet pack --configuration Release --no-build -o ./nupkg

    - name: 📝 Generate Release Notes
      id: git-cliff
      uses: orhun/git-cliff-action@v4
      with:
        config: cliff.toml
        args: --latest --tag ${{ github.ref_name }}

    - name: 🚀 Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        body: ${{ steps.git-cliff.outputs.content }}
        files: ./nupkg/*.nupkg
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}