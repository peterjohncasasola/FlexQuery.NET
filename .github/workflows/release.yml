name: Auto Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: 🛠 Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: 📦 Restore
      run: dotnet restore FlexQuery.NET.slnx

    - name: 🔨 Build
      run: dotnet build FlexQuery.NET.slnx --configuration Release --no-restore

    - name: 🔍 Resolve Release Notes
      id: resolve-notes
      shell: bash
      run: |
        # Define the expected path for version-specific release notes based on the tag
        NOTES_FILE="docs/release-notes/${{ github.ref_name }}.md"
        
        # Check if the specific release notes file exists
        if [ -f "$NOTES_FILE" ]; then
          echo "Found version-specific release notes: $NOTES_FILE"
          echo "notes_file=$NOTES_FILE" >> "$GITHUB_OUTPUT"
        else
          echo "Version-specific release notes not found at $NOTES_FILE."
          echo "Falling back to CHANGELOG.md."
          echo "notes_file=CHANGELOG.md" >> "$GITHUB_OUTPUT"
        fi

    - name: 📦 Pack NuGet
      shell: bash
      run: |
        # Extract version without 'v' prefix (e.g. v3.0.0 -> 3.0.0)
        VERSION="${{ github.ref_name }}"
        VERSION="${VERSION#v}"

        # Copy the resolved release notes to a known location
        cp "${{ steps.resolve-notes.outputs.notes_file }}" release-notes.txt

        # Inject release notes via a temporary .props file to avoid
        # shell escaping issues with MSBuild command-line properties.
        # MSBuild's $([System.IO.File]::ReadAllText()) reads the file
        # at evaluation time, bypassing all argument parsing problems.
        cat > release-notes.props <<'PROPS'
        <Project>
          <PropertyGroup>
            <PackageReleaseNotes>$([System.IO.File]::ReadAllText("$(MSBuildThisFileDirectory)release-notes.txt"))</PackageReleaseNotes>
          </PropertyGroup>
        </Project>
        PROPS

        dotnet pack FlexQuery.NET.slnx \
          --configuration Release \
          --no-build \
          -o ./nupkg \
          /p:PackageVersion="$VERSION" \
          /p:CustomBeforeMicrosoftCommonProps="$(pwd)/release-notes.props"

    - name: 🚀 Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        # Use body_path to read the release description from the resolved file
        body_path: ${{ steps.resolve-notes.outputs.notes_file }}
        files: ./nupkg/*.nupkg
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}