name: Deploy FlexQuery.NET Demo API to Azure

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "samples/FlexQuery.NET.Samples.WebApi/**"
      - ".github/workflows/azure-demo-api.yml"

  workflow_dispatch:

env:
  PROJECT_PATH: samples/FlexQuery.NET.Samples.WebApi/FlexQuery.NET.Samples.WebApi.csproj
  PUBLISH_PATH: ./publish

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Restore
        run: dotnet restore "${{ env.PROJECT_PATH }}"

      - name: Build
        run: dotnet build "${{ env.PROJECT_PATH }}" --configuration Release --no-restore

      - name: Publish
        run: dotnet publish "${{ env.PROJECT_PATH }}" --configuration Release --no-build --output "${{ env.PUBLISH_PATH }}"

      - name: Upload publish artifacts
        uses: actions/upload-artifact@v4
        with:
          name: webapp
          path: ${{ env.PUBLISH_PATH }}

  deploy:
    name: Deploy to Azure Web App
    runs-on: ubuntu-latest
    needs: build

    permissions:
      contents: read

    steps:
      - name: Download publish artifacts
        uses: actions/download-artifact@v4
        with:
          name: webapp
          path: ${{ env.PUBLISH_PATH }}

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: flexquery-demo-api
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ${{ env.PUBLISH_PATH }}