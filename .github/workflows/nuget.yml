name: Build, Test & Publish NuGet

on:
  push:
    branches:
      - main
      - feature/**
    tags:
      - "v*"

env:
  DOTNET_VERSION: '8.0.x'
  SOLUTION_PATH: 'FlexQuery.NET.slnx'
  CORE_PROJECT_PATH: 'src/FlexQuery.NET/FlexQuery.NET.csproj'
  EFCORE_PROJECT_PATH: 'src/FlexQuery.NET.EntityFrameworkCore/FlexQuery.NET.EntityFrameworkCore.csproj'
  ASPNETCORE_PROJECT_PATH: 'src/FlexQuery.NET.AspNetCore/FlexQuery.NET.AspNetCore.csproj'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION_PATH }}

      - name: Build
        run: dotnet build ${{ env.SOLUTION_PATH }} --no-restore -c Release

      - name: Test
        run: dotnet test ${{ env.SOLUTION_PATH }} -c Release --no-build --verbosity normal

  publish:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Resolve Release Notes
        id: notes
        shell: bash
        run: |
          # Try version-specific release notes first, fall back to git log
          NOTES_FILE="docs/release-notes/${{ github.ref_name }}.md"

          if [ -f "$NOTES_FILE" ]; then
            echo "Using version-specific release notes: $NOTES_FILE"
            cp "$NOTES_FILE" release-notes.txt
          else
            echo "No version-specific notes found. Generating from git log."
            PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
            if [ -z "$PREV_TAG" ]; then
              git log --pretty=format:"- %s" > release-notes.txt
            else
              git log "$PREV_TAG..HEAD" --pretty=format:"- %s" > release-notes.txt
            fi
          fi

      - name: Pack
        shell: bash
        run: |
          # Inject release notes via a temporary .props file to avoid
          # shell escaping issues with MSBuild command-line properties.
          # MSBuild's $([System.IO.File]::ReadAllText()) reads the file
          # at evaluation time, bypassing all argument parsing problems.
          cat > release-notes.props <<'PROPS'
          <Project>
            <PropertyGroup>
              <PackageReleaseNotes>$([System.IO.File]::ReadAllText("$(MSBuildThisFileDirectory)release-notes.txt"))</PackageReleaseNotes>
            </PropertyGroup>
          </Project>
          PROPS

          dotnet pack ${{ env.SOLUTION_PATH }} \
            -c Release \
            -o ./nupkgs \
            /p:PackageVersion=${{ steps.version.outputs.VERSION }} \
            /p:CustomBeforeMicrosoftCommonProps="$(pwd)/release-notes.props"

      - name: Publish to NuGet
        run: |
          dotnet nuget push ./nupkgs/*.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate