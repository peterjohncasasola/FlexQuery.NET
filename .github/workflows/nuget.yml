name: Build, Test & Publish NuGet

on:
  push:
    branches:
      - main
      - feature/**
    tags:
      - "v*"

env:
  DOTNET_VERSION: '8.0.x'
  PROJECT_PATH:   'src/FlexQuery.NET/FlexQuery.NET.csproj'
  TEST_PATH:      'tests/FlexQuery.NET.Tests/FlexQuery.NET.Tests.csproj'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - run: dotnet restore
      - run: dotnet build --no-restore -c Release

      - name: Test
        run: |
          dotnet test ${{ env.TEST_PATH }} \
            --no-build -c Release

  publish:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - run: dotnet restore
      - run: dotnet build --no-restore -c Release

      # 🔥 Extract version (supports prerelease)
      - name: Extract version from tag
        id: version
        run: |
          RAW=${GITHUB_REF#refs/tags/v}

          echo "VERSION=$RAW" >> $GITHUB_OUTPUT

          if [[ "$RAW" == *"-"* ]]; then
            echo "IS_PRERELEASE=true" >> $GITHUB_OUTPUT
          else
            echo "IS_PRERELEASE=false" >> $GITHUB_OUTPUT
          fi

          echo "Version: $RAW"

      # 📦 Pack with version injection
      - name: Pack
        run: |
          dotnet pack ${{ env.PROJECT_PATH }} \
            --no-build \
            -c Release \
            -o ./nupkgs \
            /p:PackageVersion=${{ steps.version.outputs.VERSION }}

      # 🚀 Publish (stable + prerelease supported)
      - name: Publish to NuGet
        run: |
          dotnet nuget push ./nupkgs/*.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate