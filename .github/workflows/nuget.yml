name: Build, Test & Publish NuGet

on:
  push:
    branches:
      - main
      - feature/**
    tags:
      - "v*"

env:
  DOTNET_VERSION: '8.0.x'
  CORE_PROJECT_PATH: 'src/FlexQuery.NET/FlexQuery.NET.csproj'
  EFCORE_PROJECT_PATH: 'src/FlexQuery.NET.EFCore/FlexQuery.NET.EFCore.csproj'
  ASPNETCORE_PROJECT_PATH: 'src/FlexQuery.NET.AspNetCore/FlexQuery.NET.AspNetCore.csproj'
  TEST_PATH: 'tests/FlexQuery.NET.Tests/FlexQuery.NET.Tests.csproj'
  SOLUTION_PATH: 'FlexQuery.NET.slnx'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # IMPORTANT for git history (release notes)

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION_PATH }}

      - name: Build
        run: dotnet build ${{ env.SOLUTION_PATH }} --no-restore -c Release

      - name: Test
        run: dotnet test ${{ env.TEST_PATH }} -c Release --no-build

  publish:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # REQUIRED for tags + logs

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION_PATH }}

      - name: Build
        run: dotnet build ${{ env.SOLUTION_PATH }} --no-restore -c Release

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

          if [[ "$VERSION" == *"-"* ]]; then
            echo "IS_PRERELEASE=true" >> $GITHUB_OUTPUT
          else
            echo "IS_PRERELEASE=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate Release Notes
        id: notes
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -z "$PREV_TAG" ]; then
            NOTES=$(git log --pretty=format:"- %s")
          else
            NOTES=$(git log $PREV_TAG..HEAD --pretty=format:"- %s")
          fi

          echo "NOTES<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Pack
        run: |
          dotnet pack ${{ env.CORE_PROJECT_PATH }} \
            --no-build \
            -c Release \
            -o ./nupkgs \
            /p:PackageVersion=${{ steps.version.outputs.VERSION }} \
            /p:PackageReleaseNotes="${{ steps.notes.outputs.NOTES }}"

          dotnet pack ${{ env.EFCORE_PROJECT_PATH }} \
            --no-build \
            -c Release \
            -o ./nupkgs \
            /p:PackageVersion=${{ steps.version.outputs.VERSION }} \
            /p:PackageReleaseNotes="${{ steps.notes.outputs.NOTES }}"

          dotnet pack ${{ env.ASPNETCORE_PROJECT_PATH }} \
            --no-build \
            -c Release \
            -o ./nupkgs \
            /p:PackageVersion=${{ steps.version.outputs.VERSION }} \
            /p:PackageReleaseNotes="${{ steps.notes.outputs.NOTES }}"

      - name: Publish to NuGet
        run: |
          dotnet nuget push ./nupkgs/*.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate